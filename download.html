<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Downloading VoxWild...</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta http-equiv="refresh" content="1; url=https://github.com/tagee1/VoxWild/releases/latest/download/VoxWild-Setup.exe" />
  <style>
    :root {
      --bg:        #0d0d0d;
      --surface:   #171717;
      --card:      #1f1f1f;
      --border:    #383838;
      --accent:    #00d98b;
      --accent-h:  #2ee5a0;
      --txt:       #f0ece4;
      --txt2:      #9a9290;
      --txt3:      #4e4a48;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--txt);
    }
    .subtitle {
      font-size: 15px;
      color: var(--txt2);
      margin-bottom: 32px;
    }

    /* Progress dots */
    .dots {
      display: inline-flex;
      gap: 8px;
      margin: 0 0 28px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }

    .note {
      font-size: 13px;
      color: var(--txt3);
      line-height: 1.6;
      margin-top: 24px;
    }
    .fallback {
      margin-top: 20px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--txt2);
    }
    .fallback a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .fallback a:hover { color: var(--accent-h); }
    .back {
      display: inline-block;
      margin-top: 20px;
      color: var(--txt3);
      font-size: 13px;
      text-decoration: none;
    }
    .back:hover { color: var(--txt2); }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="VoxWild" class="logo" />
    <h1>Downloading VoxWild...</h1>
    <p class="subtitle">Your download should start in a moment.</p>

    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="fallback">
      Not starting? <a id="manual" href="https://github.com/tagee1/VoxWild/releases/latest/download/VoxWild-Setup.exe">Click here to download directly</a>.
    </div>

    <p class="note">
      Windows may show a SmartScreen warning the first time — VoxWild is not yet
      code-signed. Click <strong>"More info"</strong> then <strong>"Run anyway"</strong> to proceed.
    </p>

    <a href="/" class="back">← Back to voxwild.com</a>
  </div>

  <script>
    // Trigger immediate download — no waiting for meta refresh.
    window.location.href = "https://github.com/tagee1/VoxWild/releases/latest/download/VoxWild-Setup.exe";
  </script>
</body>
</html>
